name: "I Am Worthy!"
options:
  bundleIdPrefix: com.jtrant
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "5L4KT67Y36"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  IAmWorthy:
    type: application
    platform: iOS
    sources:
      - path: IAmWorthyApp
      - path: Shared
      - path: IAmWorthyApp/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-am-worthy
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "I Am Worthy!"
        INFOPLIST_KEY_CFBundleName: "I Am Worthy!"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: IAmWorthyWidgetExtension
      - target: IAmWorthyWatch
        embed: true

  IAmWorthyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: IAmWorthyWidget
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-am-worthy.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: IAmWorthyWidget/Info.plist
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  IAmWorthyWatch:
    type: application
    platform: watchOS
    sources:
      - path: IAmWorthyWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-am-worthy.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: "I Am Worthy!"
        INFOPLIST_KEY_CFBundleName: "I Am Worthy!"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.jtrant.i-am-worthy
        INFOPLIST_KEY_WKWatchOnly: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - target: IAmWorthyWatchWidget
        embed: true

  IAmWorthyWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: IAmWorthyWatchWidget
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jtrant.i-am-worthy.watchkitapp.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: IAmWorthyWatchWidget/Info.plist
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

schemes:
  IAmWorthy:
    build:
      targets:
        IAmWorthy: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  IAmWorthyWatch:
    build:
      targets:
        IAmWorthyWatch: all
    run:
      config: Debug
    archive:
      config: Release
