name: IAmWorthy
options:
  bundleIdPrefix: com.proofpoint.jtrant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""      # Set your Team ID in Xcode → Signing & Capabilities
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  IAmWorthy:
    type: application
    platform: iOS
    sources:
      - path: IAmWorthyApp
      - path: Shared
      - path: IAmWorthyApp/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proofpoint.jtrant.iamworthy
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "I Am Worthy"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: IAmWorthyWidgetExtension

  IAmWorthyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: IAmWorthyWidget
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proofpoint.jtrant.iamworthy.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: IAmWorthyWidget/Info.plist
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
